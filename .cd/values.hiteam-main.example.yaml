sharedInfo:
  project:
    name: "hiteam"
    branch: "main"
  pullSecret:
    name: "hiteam-main-docker-secret"
    dockerConfigJson: ""

api:
  image: "ghcr.io/your-org/hiteam-api:main-CHANGE_ME"
  env:
    API_PUBLIC_URL: "https://api.hiteam.example.com"
    FRONTEND_URL: "https://hiteam.example.com"
    WEB_ADMIN_BASE_URL: "https://hiteam.example.com"
    DATABASE_URL: "postgresql://USER:PASSWORD@EXTERNAL_POSTGRES_HOST:5432/DB_NAME"
    REDIS_URL: "redis://EXTERNAL_REDIS_HOST:6379"
    S3_ENDPOINT: ""
    S3_ACCESS_KEY: "CHANGE_ME"
    S3_SECRET_KEY: "CHANGE_ME"
    S3_BUCKET: "smart-prod"
    S3_PUBLIC_BASE_URL: ""
    JWT_ACCESS_SECRET: "CHANGE_ME"
    JWT_REFRESH_SECRET: "CHANGE_ME"
    SYSTEM_SECRET: "CHANGE_ME"
    HI_TEAM_INTERNAL_ACCESS_KEY: "CHANGE_ME"
    COMPRE_FACE_BASE_URL: ""
    COMPRE_FACE_API_KEY: "CHANGE_ME"
    COMPRE_FACE_TIMEOUT_MS: "10000"

webAdmin:
  image: "ghcr.io/your-org/hiteam-web-admin:main-CHANGE_ME"
  env:
    NEXT_PUBLIC_API_URL: "https://api.hiteam.example.com"
    NEXT_PUBLIC_GRAPHQL_URL: "https://api.hiteam.example.com/graphql"
    INTERNAL_API_URL: "http://hiteam-svc-api:80"
    WEB_ADMIN_BASE_URL: "https://hiteam.example.com"
    NEXT_PUBLIC_WEB_ADMIN_BASE_URL: "https://hiteam.example.com"
    NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "CHANGE_ME"
    SYSTEM_SECRET: "CHANGE_ME"
    HI_TEAM_INTERNAL_ACCESS_KEY: "CHANGE_ME"

migrations:
  enabled: false

postgres:
  enabled: false

redis:
  enabled: false

minio:
  enabled: true
  rootUser: "minio"
  rootPassword: "miniosecret"
  bucket: "smart-prod"

compreface:
  enabled: true
  env:
    adminJavaOpts: "-Xmx512m"
    apiJavaOpts: "-Xmx1536m"
    saveImagesToDb: "true"
    maxFileSize: "5MB"
    maxRequestSize: "10MB"
    uwsgiProcesses: "1"
    uwsgiThreads: "1"
    connectionTimeout: "10000"
    readTimeout: "60000"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1500m"
      memory: "4Gi"

ingress:
  frontend:
    enabled: true
    host: "hiteam.example.com"
    tlsSecret: "hiteam-main-tls-frontend"
    enableWwwRedirect: true
  backend:
    enabled: true
    host: "api.hiteam.example.com"
    tlsSecret: "hiteam-main-tls-api"
  storage:
    enabled: true
    host: "storage.hiteam.example.com"
    tlsSecret: "hiteam-main-tls-storage"
  compreface:
    enabled: true
    host: "compreface.hiteam.example.com"
    tlsSecret: "hiteam-main-tls-compreface"

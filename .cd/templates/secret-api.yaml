{{- if .Values.api.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: envs-api
  namespace: {{ .Release.Namespace }}
  labels:
    project: {{ .Values.sharedInfo.project.name }}
    branch: {{ .Values.sharedInfo.project.branch }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  PORT: {{ .Values.api.env.PORT | quote }}
  NODE_ENV: {{ .Values.api.env.NODE_ENV | quote }}
  API_PUBLIC_URL: {{ required "Set api.env.API_PUBLIC_URL or ingress.backend.host" (include "hiteam.publicApiUrl" .) | quote }}
  FRONTEND_URL: {{ required "Set api.env.FRONTEND_URL or ingress.frontend.host" (default (include "hiteam.publicFrontendUrl" .) .Values.api.env.FRONTEND_URL) | quote }}
  WEB_ADMIN_BASE_URL: {{ required "Set api.env.WEB_ADMIN_BASE_URL or ingress.frontend.host" (default (include "hiteam.publicFrontendUrl" .) .Values.api.env.WEB_ADMIN_BASE_URL) | quote }}
  DATABASE_URL: {{ required "Set api.env.DATABASE_URL or enable postgres" (include "hiteam.databaseUrl" .) | quote }}
  REDIS_URL: {{ required "Set api.env.REDIS_URL or enable redis" (include "hiteam.redisUrl" .) | quote }}
  S3_ENDPOINT: {{ required "Set api.env.S3_ENDPOINT or enable minio" (include "hiteam.s3Endpoint" .) | quote }}
  S3_REGION: {{ .Values.api.env.S3_REGION | quote }}
  S3_ACCESS_KEY: {{ required "Set api.env.S3_ACCESS_KEY or enable minio" (include "hiteam.s3AccessKey" .) | quote }}
  S3_SECRET_KEY: {{ required "Set api.env.S3_SECRET_KEY or enable minio" (include "hiteam.s3SecretKey" .) | quote }}
  S3_BUCKET: {{ required "Set api.env.S3_BUCKET or enable minio" (include "hiteam.s3Bucket" .) | quote }}
  S3_PUBLIC_BASE_URL: {{ include "hiteam.s3PublicBaseUrl" . | quote }}
  GOOGLE_OAUTH_CLIENT_ID: {{ .Values.api.env.GOOGLE_OAUTH_CLIENT_ID | quote }}
  GOOGLE_OAUTH_CLIENT_SECRET: {{ .Values.api.env.GOOGLE_OAUTH_CLIENT_SECRET | quote }}
  GOOGLE_OAUTH_REDIRECT_URI: {{ .Values.api.env.GOOGLE_OAUTH_REDIRECT_URI | quote }}
  GOOGLE_OAUTH_STATE_SECRET: {{ .Values.api.env.GOOGLE_OAUTH_STATE_SECRET | quote }}
  JWT_ACCESS_SECRET: {{ required "Set api.env.JWT_ACCESS_SECRET" .Values.api.env.JWT_ACCESS_SECRET | quote }}
  JWT_REFRESH_SECRET: {{ required "Set api.env.JWT_REFRESH_SECRET" .Values.api.env.JWT_REFRESH_SECRET | quote }}
  JWT_ACCESS_EXPIRES_IN: {{ .Values.api.env.JWT_ACCESS_EXPIRES_IN | quote }}
  JWT_REFRESH_EXPIRES_IN: {{ .Values.api.env.JWT_REFRESH_EXPIRES_IN | quote }}
  BIOMETRIC_PROVIDER: {{ .Values.api.env.BIOMETRIC_PROVIDER | quote }}
  COMPRE_FACE_BASE_URL: {{ required "Set api.env.COMPRE_FACE_BASE_URL" .Values.api.env.COMPRE_FACE_BASE_URL | quote }}
  COMPRE_FACE_API_KEY: {{ required "Set api.env.COMPRE_FACE_API_KEY" .Values.api.env.COMPRE_FACE_API_KEY | quote }}
  COMPRE_FACE_SIMILARITY_THRESHOLD: {{ .Values.api.env.COMPRE_FACE_SIMILARITY_THRESHOLD | quote }}
  AWS_REGION: {{ .Values.api.env.AWS_REGION | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.api.env.AWS_ACCESS_KEY_ID | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.api.env.AWS_SECRET_ACCESS_KEY | quote }}
  AWS_REKOGNITION_SIMILARITY_THRESHOLD: {{ .Values.api.env.AWS_REKOGNITION_SIMILARITY_THRESHOLD | quote }}
  AWS_BIOMETRIC_ASSUME_ROLE_ARN: {{ .Values.api.env.AWS_BIOMETRIC_ASSUME_ROLE_ARN | quote }}
  AWS_BIOMETRIC_SESSION_DURATION_SECONDS: {{ .Values.api.env.AWS_BIOMETRIC_SESSION_DURATION_SECONDS | quote }}
  AWS_BIOMETRIC_EXTERNAL_ID: {{ .Values.api.env.AWS_BIOMETRIC_EXTERNAL_ID | quote }}
  LIBRETRANSLATE_URL: {{ .Values.api.env.LIBRETRANSLATE_URL | quote }}
  LIBRETRANSLATE_API_KEY: {{ .Values.api.env.LIBRETRANSLATE_API_KEY | quote }}
  EXPO_ACCESS_TOKEN: {{ .Values.api.env.EXPO_ACCESS_TOKEN | quote }}
  SYSTEM_SECRET: {{ required "Set api.env.SYSTEM_SECRET" .Values.api.env.SYSTEM_SECRET | quote }}
  HI_TEAM_INTERNAL_ACCESS_KEY: {{ required "Set api.env.HI_TEAM_INTERNAL_ACCESS_KEY" .Values.api.env.HI_TEAM_INTERNAL_ACCESS_KEY | quote }}
{{- end }}

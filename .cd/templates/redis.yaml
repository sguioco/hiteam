{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hiteam.redisServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "hiteam.redisServiceName" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  type: {{ .Values.redis.service.type }}
  selector:
    app: {{ include "hiteam.redisServiceName" . }}
  ports:
    - name: redis
      port: {{ .Values.redis.service.port }}
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hiteam.redisServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "hiteam.redisServiceName" . }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "hiteam.redisServiceName" . }}
  template:
    metadata:
      labels:
        app: {{ include "hiteam.redisServiceName" . }}
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          args:
            - redis-server
            - --dir
            - /data
            - --appendonly
            - {{ ternary "yes" "no" .Values.redis.config.appendOnly | quote }}
            - --appendfsync
            - {{ .Values.redis.config.appendFsync | quote }}
            {{- range .Values.redis.config.save }}
            - --save
            - {{ . | quote }}
            {{- end }}
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: {{ .Values.redis.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.redis.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.redis.readinessProbe.timeoutSeconds }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: {{ .Values.redis.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.redis.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.redis.livenessProbe.timeoutSeconds }}
          resources:
{{ toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "hiteam.redisServiceName" . }}-data

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hiteam.redisServiceName" . }}-data
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.redis.persistence.storageClassName }}
  storageClassName: {{ .Values.redis.persistence.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size | quote }}
{{- end }}

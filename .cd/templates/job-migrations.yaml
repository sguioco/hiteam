{{- if and .Values.api.enabled .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "hiteam.fullname" . }}-migrations
  namespace: {{ .Release.Namespace }}
  labels:
    project: {{ .Values.sharedInfo.project.name }}
    branch: {{ .Values.sharedInfo.project.branch }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "5"
spec:
  {{- $ttl := (.Values.migrations.ttlSecondsAfterFinished | default 0) | int }}
  {{- if gt $ttl 0 }}
  ttlSecondsAfterFinished: {{ $ttl }}
  {{- end }}
  backoffLimit: 3
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds | default 900 }}
  template:
    metadata:
      labels:
        project: {{ .Values.sharedInfo.project.name }}
        branch: {{ .Values.sharedInfo.project.branch }}
    spec:
      restartPolicy: Never
      {{- if .Values.sharedInfo.pullSecret.dockerConfigJson }}
      imagePullSecrets:
        - name: {{ include "hiteam.pullSecretName" . }}
      {{- end }}
      {{- if or .Values.migrations.waitFor.host .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-database
          image: busybox:1.36.1
          command:
            - sh
            - -c
            - >
              until nc -z -w2 {{ default (include "hiteam.postgresServiceName" .) .Values.migrations.waitFor.host }} {{ default .Values.postgres.service.port .Values.migrations.waitFor.port }};
              do
                echo "waiting for database";
                sleep 2;
              done
      {{- end }}
      containers:
        - name: migrations
          image: {{ required "Set migrations.image or api.image before enabling migrations" (default .Values.api.image .Values.migrations.image) | quote }}
          imagePullPolicy: {{ .Values.api.pullPolicy | default "Always" }}
          command:
{{ toYaml .Values.migrations.command | nindent 12 }}
          envFrom:
            - secretRef:
                name: envs-api
            {{- if .Values.sharedInfo.runtimeSecretName }}
            - secretRef:
                name: {{ .Values.sharedInfo.runtimeSecretName }}
            {{- end }}
          resources:
            {{- with .Values.migrations.resources.requests }}
            requests:
              {{- if .cpu }}
              cpu: {{ .cpu | quote }}
              {{- end }}
              {{- if .memory }}
              memory: {{ .memory | quote }}
              {{- end }}
            {{- end }}
            {{- with .Values.migrations.resources.limits }}
            limits:
              {{- if .cpu }}
              cpu: {{ .cpu | quote }}
              {{- end }}
              {{- if .memory }}
              memory: {{ .memory | quote }}
              {{- end }}
            {{- end }}
{{- end }}

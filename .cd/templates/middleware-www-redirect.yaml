{{- if and .Values.ingress.frontend.enabled .Values.ingress.frontend.enableWwwRedirect }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: www-to-non-www
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "25"
spec:
  redirectRegex:
    regex: ^https://www\.(.*)
    replacement: https://$1
    permanent: true
{{- end }}

{{- if .Values.webAdmin.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: envs-web-admin
  namespace: {{ .Release.Namespace }}
  labels:
    project: {{ .Values.sharedInfo.project.name }}
    branch: {{ .Values.sharedInfo.project.branch }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
type: Opaque
stringData:
  NEXT_PUBLIC_API_URL: {{ required "Set webAdmin.env.NEXT_PUBLIC_API_URL or ingress.backend.host" (include "hiteam.webAdminPublicApiUrl" .) | quote }}
  NEXT_PUBLIC_GRAPHQL_URL: {{ required "Set webAdmin.env.NEXT_PUBLIC_GRAPHQL_URL or webAdmin.env.NEXT_PUBLIC_API_URL" (include "hiteam.webAdminPublicGraphqlUrl" .) | quote }}
  INTERNAL_API_URL: {{ required "Set webAdmin.env.INTERNAL_API_URL" (include "hiteam.webAdminInternalApiUrl" .) | quote }}
  WEB_ADMIN_BASE_URL: {{ required "Set webAdmin.env.WEB_ADMIN_BASE_URL or ingress.frontend.host" (include "hiteam.webAdminBaseUrl" .) | quote }}
  NEXT_PUBLIC_WEB_ADMIN_BASE_URL: {{ required "Set webAdmin.env.NEXT_PUBLIC_WEB_ADMIN_BASE_URL or webAdmin.env.WEB_ADMIN_BASE_URL" (default (include "hiteam.webAdminBaseUrl" .) .Values.webAdmin.env.NEXT_PUBLIC_WEB_ADMIN_BASE_URL) | quote }}
  NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: {{ .Values.webAdmin.env.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY | quote }}
  HI_TEAM_INTERNAL_ACCESS_KEY: {{ required "Set webAdmin.env.HI_TEAM_INTERNAL_ACCESS_KEY or api.env.HI_TEAM_INTERNAL_ACCESS_KEY" (default .Values.api.env.HI_TEAM_INTERNAL_ACCESS_KEY .Values.webAdmin.env.HI_TEAM_INTERNAL_ACCESS_KEY) | quote }}
  SYSTEM_SECRET: {{ required "Set webAdmin.env.SYSTEM_SECRET or api.env.SYSTEM_SECRET" (default .Values.api.env.SYSTEM_SECRET .Values.webAdmin.env.SYSTEM_SECRET) | quote }}
  NEXT_PUBLIC_DEMO_MODE: {{ .Values.webAdmin.env.NEXT_PUBLIC_DEMO_MODE | quote }}
  NEXT_PUBLIC_DEFAULT_TENANT_SLUG: {{ .Values.webAdmin.env.NEXT_PUBLIC_DEFAULT_TENANT_SLUG | quote }}
  NEXT_PUBLIC_MOBILE_APP_STORE_URL: {{ .Values.webAdmin.env.NEXT_PUBLIC_MOBILE_APP_STORE_URL | quote }}
  NEXT_PUBLIC_MOBILE_PLAY_STORE_URL: {{ .Values.webAdmin.env.NEXT_PUBLIC_MOBILE_PLAY_STORE_URL | quote }}
{{- end }}

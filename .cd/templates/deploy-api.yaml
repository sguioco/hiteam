{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hiteam.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "hiteam.fullname" . }}-api
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  revisionHistoryLimit: {{ .Values.sharedInfo.revisionHistoryLimit | default 2 }}
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: {{ include "hiteam.fullname" . }}-api
  template:
    metadata:
      labels:
        app: {{ include "hiteam.fullname" . }}-api
    spec:
      {{- if .Values.sharedInfo.pullSecret.dockerConfigJson }}
      imagePullSecrets:
        - name: {{ include "hiteam.pullSecretName" . }}
      {{- end }}
      containers:
        - name: api
          image: {{ .Values.api.image | quote }}
          imagePullPolicy: {{ .Values.api.pullPolicy | default "Always" }}
          envFrom:
            - secretRef:
                name: envs-api
          ports:
            - name: http
              containerPort: {{ .Values.api.service.targetPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
{{ toYaml .Values.api.resources | nindent 12 }}
{{- end }}

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hiteam-main
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sguioco/hiteam.git
    targetRevision: main
    path: .cd
    helm:
      valueFiles:
        - values.yaml
        - values.hiteam-main.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: hiteam-main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

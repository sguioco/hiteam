sharedInfo:
  project:
    name: "hiteam"
    branch: "main"
  runtimeSecretName: "hiteam-main-runtime"
  pullSecret:
    # Leave dockerConfigJson empty if the GHCR packages are public.
    # If they stay private, set base64(".docker/config.json") here.
    name: "hiteam-main-docker-secret"
    dockerConfigJson: ""

api:
  image: "ghcr.io/sguioco/hiteam-api:main-544e9d3f25b021446875ad2a149285e2a8c76330"
  env:
    API_PUBLIC_URL: "https://api.85.237.211.182.nip.io"
    FRONTEND_URL: "https://hiteam.85.237.211.182.nip.io"
    WEB_ADMIN_BASE_URL: "https://hiteam.85.237.211.182.nip.io"
    DATABASE_URL: ""
    REDIS_URL: ""
    S3_ENDPOINT: ""
    S3_ACCESS_KEY: ""
    S3_SECRET_KEY: ""
    S3_BUCKET: "smart-local"
    S3_PUBLIC_BASE_URL: ""
    GOOGLE_OAUTH_CLIENT_ID: ""
    GOOGLE_OAUTH_CLIENT_SECRET: ""
    GOOGLE_OAUTH_REDIRECT_URI: "https://api.85.237.211.182.nip.io/api/v1/org/google-business/callback"
    GOOGLE_OAUTH_STATE_SECRET: ""
    JWT_ACCESS_SECRET: ""
    JWT_REFRESH_SECRET: ""
    SYSTEM_SECRET: ""
    HI_TEAM_INTERNAL_ACCESS_KEY: ""
    COMPRE_FACE_BASE_URL: ""
    COMPRE_FACE_API_KEY: ""
    COMPRE_FACE_TIMEOUT_MS: "10000"

webAdmin:
  image: "ghcr.io/sguioco/hiteam-web-admin:main-544e9d3f25b021446875ad2a149285e2a8c76330"
  env:
    NEXT_PUBLIC_API_URL: "https://api.85.237.211.182.nip.io"
    NEXT_PUBLIC_GRAPHQL_URL: "https://api.85.237.211.182.nip.io/graphql"
    INTERNAL_API_URL: "http://hiteam-svc-api:80"
    WEB_ADMIN_BASE_URL: "https://hiteam.85.237.211.182.nip.io"
    NEXT_PUBLIC_WEB_ADMIN_BASE_URL: "https://hiteam.85.237.211.182.nip.io"
    NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ""
    SYSTEM_SECRET: ""
    HI_TEAM_INTERNAL_ACCESS_KEY: ""

migrations:
  enabled: true
  waitFor:
    host: "dpg-d719g6ggjchc739c28tg-a.oregon-postgres.render.com"
    port: 5432

postgres:
  enabled: false

redis:
  enabled: true
  persistence:
    enabled: true
    size: "1Gi"
    storageClassName: ""
  config:
    appendOnly: true
    appendFsync: "everysec"
    save:
      - "900 1"
      - "300 10"
      - "60 10000"
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
  livenessProbe:
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "768Mi"

minio:
  enabled: true
  rootUser: "minio"
  rootPassword: "miniosecret"
  bucket: "smart-local"

compreface:
  enabled: true
  env:
    adminJavaOpts: "-Xmx512m"
    apiJavaOpts: "-Xmx1536m"
    saveImagesToDb: "true"
    maxFileSize: "5MB"
    maxRequestSize: "10MB"
    uwsgiProcesses: "1"
    uwsgiThreads: "1"
    connectionTimeout: "10000"
    readTimeout: "60000"
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "1500m"
      memory: "4Gi"

ingress:
  frontend:
    enabled: true
    host: "hiteam.85.237.211.182.nip.io"
    tlsSecret: "hiteam-main-tls-frontend"
    enableWwwRedirect: true
  backend:
    enabled: true
    host: "api.85.237.211.182.nip.io"
    tlsSecret: "hiteam-main-tls-api"
  storage:
    enabled: true
    host: "storage.85.237.211.182.nip.io"
    tlsSecret: "hiteam-main-tls-storage"
  compreface:
    enabled: true
    host: "compreface.85.237.211.182.nip.io"
    tlsSecret: "hiteam-main-tls-compreface"

services:
  postgres:
    profiles: ['local-backend']
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smart
      POSTGRES_USER: smart
      POSTGRES_PASSWORD: smart
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smart -d smart']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    profiles: ['local-backend']
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data

  minio:
    profiles: ['local-backend']
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio_data:/data

  createbuckets:
    profiles: ['local-backend']
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minio miniosecret) do echo 'waiting for minio' && sleep 1; done;
      /usr/bin/mc mb -p local/smart-local || true;
      /usr/bin/mc anonymous set download local/smart-local || true;
      exit 0;
      "

  api:
    profiles: ['local-backend']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env.local
    environment:
      PORT: 4000
      API_PUBLIC_URL: http://localhost:4000
      NODE_ENV: production
      DATABASE_URL: postgresql://smart:smart@postgres:5432/smart
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: miniosecret
      S3_BUCKET: smart-local
      S3_PUBLIC_BASE_URL: http://localhost:9000/smart-local
      BIOMETRIC_PROVIDER: compreface
      COMPRE_FACE_BASE_URL: http://host.docker.internal:8000
      AWS_REGION: us-east-1
      AWS_REKOGNITION_SIMILARITY_THRESHOLD: 90
      AWS_BIOMETRIC_ASSUME_ROLE_ARN: ''
      AWS_BIOMETRIC_SESSION_DURATION_SECONDS: 900
      AWS_BIOMETRIC_EXTERNAL_ID: ''
      COMPRE_FACE_API_KEY: 4296f307-7fdd-4ebf-80a5-04448539355d
      COMPRE_FACE_SIMILARITY_THRESHOLD: 0.60
      EXPO_ACCESS_TOKEN: ''
      FRONTEND_URL: http://localhost:3000
      JWT_ACCESS_SECRET: change-me-access-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully

  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:4000/graphql}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_WEB_ADMIN_BASE_URL: ${NEXT_PUBLIC_WEB_ADMIN_BASE_URL:-http://localhost:3000}
    env_file:
      - .env.local
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_GRAPHQL_URL: ${NEXT_PUBLIC_GRAPHQL_URL:-http://localhost:4000/graphql}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
      NEXT_PUBLIC_WEB_ADMIN_BASE_URL: ${NEXT_PUBLIC_WEB_ADMIN_BASE_URL:-http://localhost:3000}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://localhost:4000}
      WEB_ADMIN_BASE_URL: ${WEB_ADMIN_BASE_URL:-http://localhost:3000}
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
  minio_data:

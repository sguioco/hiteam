name: Build Images For ArgoCD

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: hiteam-argocd-release
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      API_IMAGE: ghcr.io/${{ github.repository_owner }}/hiteam-api:main-${{ github.sha }}
      API_IMAGE_LATEST: ghcr.io/${{ github.repository_owner }}/hiteam-api:main-latest
      WEB_ADMIN_IMAGE: ghcr.io/${{ github.repository_owner }}/hiteam-web-admin:main-${{ github.sha }}
      WEB_ADMIN_IMAGE_LATEST: ghcr.io/${{ github.repository_owner }}/hiteam-web-admin:main-latest
      WEB_ADMIN_PUBLIC_API_URL: ${{ vars.ARGOCD_WEB_ADMIN_PUBLIC_API_URL }}
      WEB_ADMIN_PUBLIC_GRAPHQL_URL: ${{ vars.ARGOCD_WEB_ADMIN_PUBLIC_GRAPHQL_URL }}
      WEB_ADMIN_BASE_URL: ${{ vars.ARGOCD_WEB_ADMIN_BASE_URL }}
      WEB_ADMIN_GOOGLE_MAPS_API_KEY: ${{ vars.ARGOCD_WEB_ADMIN_GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required repo variables
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${WEB_ADMIN_PUBLIC_API_URL}" ]; then
            echo "Missing repo variable ARGOCD_WEB_ADMIN_PUBLIC_API_URL"
            missing=1
          fi

          if [ -z "${WEB_ADMIN_PUBLIC_GRAPHQL_URL}" ]; then
            echo "Missing repo variable ARGOCD_WEB_ADMIN_PUBLIC_GRAPHQL_URL"
            missing=1
          fi

          if [ -z "${WEB_ADMIN_BASE_URL}" ]; then
            echo "Missing repo variable ARGOCD_WEB_ADMIN_BASE_URL"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}
            ${{ env.API_IMAGE_LATEST }}

      - name: Build and push Web Admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web-admin/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.WEB_ADMIN_PUBLIC_API_URL }}
            NEXT_PUBLIC_GRAPHQL_URL=${{ env.WEB_ADMIN_PUBLIC_GRAPHQL_URL }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ env.WEB_ADMIN_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_WEB_ADMIN_BASE_URL=${{ env.WEB_ADMIN_BASE_URL }}
          tags: |
            ${{ env.WEB_ADMIN_IMAGE }}
            ${{ env.WEB_ADMIN_IMAGE_LATEST }}

      - name: Deploy new images via Argo application override
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          command_timeout: 20m
          script: |
            set -euo pipefail

            kubectl -n argocd patch application hiteam-main --type merge -p '{
              "spec": {
                "source": {
                  "helm": {
                    "parameters": [
                      {"name":"api.image","value":"${{ env.API_IMAGE }}"},
                      {"name":"webAdmin.image","value":"${{ env.WEB_ADMIN_IMAGE }}"}
                    ]
                  }
                }
              }
            }'

            kubectl -n argocd annotate application hiteam-main argocd.argoproj.io/refresh=hard --overwrite

            for attempt in $(seq 1 120); do
              sync_status="$(kubectl -n argocd get application hiteam-main -o jsonpath='{.status.sync.status}')"
              health_status="$(kubectl -n argocd get application hiteam-main -o jsonpath='{.status.health.status}')"
              operation_phase="$(kubectl -n argocd get application hiteam-main -o jsonpath='{.status.operationState.phase}')"

              echo "[argocd] attempt=${attempt} sync=${sync_status:-unknown} health=${health_status:-unknown} operation=${operation_phase:-none}"

              if [ "${operation_phase:-}" = "Failed" ] || [ "${operation_phase:-}" = "Error" ]; then
                kubectl -n argocd get application hiteam-main -o yaml
                exit 1
              fi

              if [ "${sync_status:-}" = "Synced" ] && [ "${health_status:-}" = "Healthy" ]; then
                exit 0
              fi

              sleep 5
            done

            echo "[argocd] deployment did not become Synced/Healthy in time"
            kubectl -n argocd get application hiteam-main -o yaml
            exit 1

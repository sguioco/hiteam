name: Legacy VPS Deploy

on:
  workflow_dispatch:

concurrency:
  group: hiteam-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Sync repository on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          command_timeout: 15m
          script: |
            set -euo pipefail
            export GIT_TERMINAL_PROMPT=0

            cd /root/hiteam/repo
            echo "[sync] remote $(git remote get-url origin)"
            echo "[sync] fetch"
            git fetch origin --progress --verbose
            echo "[sync] reset"
            git reset --hard origin/main
            echo "[sync] clean"
            git clean -fd

            echo "[deploy] revision $(git rev-parse --short HEAD)"

      - name: Prisma push on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            cd /root/hiteam
            export COMPOSE_DOCKER_CLI_BUILD=1
            export DOCKER_BUILDKIT=1
            export BUILDKIT_PROGRESS=plain

            docker compose -p hiteam -f docker-compose.prod.yml run --rm prisma

      - name: Build API image on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          command_timeout: 45m
          script: |
            set -euo pipefail

            cd /root/hiteam
            export COMPOSE_DOCKER_CLI_BUILD=1
            export DOCKER_BUILDKIT=1
            export BUILDKIT_PROGRESS=plain

            docker compose -p hiteam -f docker-compose.prod.yml build api

      - name: Build Web Admin image on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          command_timeout: 60m
          script: |
            set -euo pipefail

            cd /root/hiteam
            export COMPOSE_DOCKER_CLI_BUILD=1
            export DOCKER_BUILDKIT=1
            export BUILDKIT_PROGRESS=plain

            docker compose -p hiteam -f docker-compose.prod.yml build web-admin

      - name: Restart services on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          command_timeout: 15m
          script: |
            set -euo pipefail

            cd /root/hiteam
            docker compose -p hiteam -f docker-compose.prod.yml up -d api web-admin

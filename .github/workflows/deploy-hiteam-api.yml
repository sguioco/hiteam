name: Deploy Hiteam API

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/deploy-hiteam-api.yml'
      - 'apps/api/**'
      - 'apps/web-admin/**'
      - 'packages/ui/**'
      - 'packages/types/**'
      - 'scripts/run-api-prisma.cjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'tsconfig.base.json'
      - '.npmrc'

concurrency:
  group: hiteam-vps-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 90m
          script: |
            set -euo pipefail

            echo "[deploy] syncing repository"
            cd /root/hiteam/repo
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            echo "[deploy] revision $(git rev-parse --short HEAD)"

            echo "[deploy] configuring build output"
            cd /root/hiteam
            export COMPOSE_DOCKER_CLI_BUILD=1
            export DOCKER_BUILDKIT=1
            export BUILDKIT_PROGRESS=plain

            echo "[deploy] prisma push"
            docker compose -p hiteam -f docker-compose.prod.yml run --rm prisma

            echo "[deploy] build api"
            docker compose -p hiteam -f docker-compose.prod.yml build api

            echo "[deploy] build web-admin"
            docker compose -p hiteam -f docker-compose.prod.yml build web-admin

            echo "[deploy] restart services"
            docker compose -p hiteam -f docker-compose.prod.yml up -d api web-admin

            echo "[deploy] completed"
